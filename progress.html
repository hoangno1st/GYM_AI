<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Bro - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="progress.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Gym Bro Logo" width="200px">
        <nav>
            <ul>
                <li><a href="#chatbot">Chatbot</a></li>
                <li><a href="#nutrition">Nutrition</a></li>
                <li><a href="#workout">Workout</a></li>
            </ul>
        </nav>
    </header>
    
    <section id="chatbot" class="section">
        <h2>Chatbot Response</h2>
        <div class="chat-container">
            <div id="chat-output"></div>
            <input type="text" id="chat-input" placeholder="Ask a workout question...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </section>
    
    <section id="nutrition" class="section">
        <h2>Nutrition Advice</h2>
        <label for="meal">Enter your meal:</label>
        <input type="text" id="meal" placeholder="e.g. Chicken, Rice">
        <button onclick="getNutrition()">Get Nutrition Info</button>
        <div id="nutrition-info"></div>
    </section>
    
    <section id="workout" class="section">
        <h2>Workout Suggestions</h2>
        <label for="goal">Select your goal:</label>
        <select id="goal">
            <option value="strength">Strength</option>
            <option value="endurance">Endurance</option>
            <option value="weight_loss">Weight Loss</option>
        </select>
        <button onclick="getWorkout()">Get Workout Plan</button>
        <div id="workout-plan"></div>
        <button onclick="goBack()">Back</button>
    </section>
    
    <script>
        function goBack() {
    window.location.href = 'index.html';
};
        
        
        function sendMessage() {
            const input = document.getElementById("chat-input");
            const output = document.getElementById("chat-output");
            const message = input.value.trim();
            if (message) {
                output.innerHTML += `<p><strong>You:</strong> ${message}</p>`;
                input.value = "";
                setTimeout(() => {
                    output.innerHTML += `<p><strong>Bot:</strong> I'm here to help with your workout and nutrition!</p>`;
                }, 500);
            }
        }
        
        function getNutrition() {
            const meal = document.getElementById("meal").value.trim();
            const info = document.getElementById("nutrition-info");
            if (meal) {
                info.innerHTML = `<p>Nutrition info for ${meal}: 200 kcal, 20g protein, 5g fat.</p>`;
            }
        }
        
        function getWorkout() {
            const goal = document.getElementById("goal").value;
            const plan = document.getElementById("workout-plan");
            let workoutPlan = "";
            switch (goal) {
                case "strength":
                    workoutPlan = "Deadlifts, Squats, Bench Press";
                    break;
                case "endurance":
                    workoutPlan = "Running, Jump Rope, Cycling";
                    break;
                case "weight_loss":
                    workoutPlan = "HIIT, Cardio, Strength Training";
                    break;
            }
            plan.innerHTML = `<p>Recommended workout: ${workoutPlan}</p>`;
        }
    </script>
    <script src="progress.js"></script>
</body>
</html>
